<!DOCTYPE html>
<html lang="ta">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>JHGPH Songbook</title>
<link rel="manifest" href="./manifest.json">
<meta name="theme-color" content="#1a1a2e">
<link rel="apple-touch-icon" href="./icon-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="JHGPH Songs">
<style>
@font-face {
  font-family:'Noto Sans Tamil';font-style:normal;font-weight:400;font-display:swap;
  src:url('./fonts/notosanstamil-tamil.woff2') format('woff2');
  unicode-range:U+0964-0965,U+0B82-0BFA,U+200C-200D,U+20B9,U+25CC;
}
@font-face {
  font-family:'Noto Sans Tamil';font-style:normal;font-weight:700;font-display:swap;
  src:url('./fonts/notosanstamil-tamil.woff2') format('woff2');
  unicode-range:U+0964-0965,U+0B82-0BFA,U+200C-200D,U+20B9,U+25CC;
}
@font-face {
  font-family:'Noto Sans Tamil';font-style:normal;font-weight:400;font-display:swap;
  src:url('./fonts/notosanstamil-latin.woff2') format('woff2');
  unicode-range:U+0000-00FF;
}
:root {
  --bg:#0d0d16; --surface:#161625; --surface2:#1f1f35; --border:#2e2e50;
  --text:#eeeef5; --text2:#8888aa; --accent:#6c8fff; --chord:#ff5c5c;
  --key-bg:#1a2e1a; --key-text:#4caf50; --fav:#ffb400; --nav-h:60px;
  --hdr-h:56px; --lyric-size:17px; --radius:14px;
  --safe-b:env(safe-area-inset-bottom,0px);
  --safe-l:env(safe-area-inset-left,0px);
  --safe-r:env(safe-area-inset-right,0px);
}
:root[data-theme="light"] {
  --bg:#f0f0f8; --surface:#ffffff; --surface2:#e8e8f4; --border:#d0d0e8;
  --text:#1a1a2e; --text2:#6666aa; --accent:#3355dd; --chord:#cc2222;
  --key-bg:#e3f5e3; --key-text:#2e7d32; --fav:#e69a00;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;overscroll-behavior:none}
body{
  font-family:'Noto Sans Tamil','Latha','Nirmala UI',sans-serif;
  background:var(--bg);color:var(--text);
  display:flex;flex-direction:column;
}

/* ── Splash ── */
#splash{
  position:fixed;inset:0;z-index:999;
  background:var(--bg);
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px;
  transition:opacity .4s,visibility .4s;
}
#splash.hidden{opacity:0;visibility:hidden}
#splash img{width:90px;height:90px;border-radius:20px;box-shadow:0 8px 32px rgba(108,143,255,.3)}
#splash .splash-title{font-size:22px;font-weight:700;color:var(--text)}
#splash .splash-sub{font-size:13px;color:var(--text2)}
.progress-track{width:200px;height:4px;background:var(--border);border-radius:2px;overflow:hidden}
.progress-fill{height:100%;background:var(--accent);border-radius:2px;width:0%;transition:width .3s}

/* ── App shell ── */
#app{display:flex;flex-direction:column;height:100vh;height:100dvh;overflow:hidden}

/* ── Header ── */
.app-header{
  flex-shrink:0;background:var(--surface);border-bottom:1px solid var(--border);
  padding:0 14px;padding-top:env(safe-area-inset-top,0);
}
.header-main{
  height:var(--hdr-h);display:flex;align-items:center;gap:10px;
}
.app-logo{height:32px;width:32px;border-radius:8px;object-fit:cover}
.app-title{font-size:16px;font-weight:700;flex:1;color:var(--text)}
.hdr-btn{
  width:38px;height:38px;display:flex;align-items:center;justify-content:center;
  background:var(--surface2);border:1px solid var(--border);border-radius:10px;
  cursor:pointer;font-size:16px;color:var(--text);flex-shrink:0;
}
.hdr-btn:active{opacity:.6}
#install-btn{display:none;font-size:12px;width:auto;padding:0 10px;gap:4px}

.search-wrap{padding-bottom:10px}
.search-inner{
  display:flex;align-items:center;gap:8px;
  background:var(--surface2);border:1.5px solid var(--border);
  border-radius:12px;padding:0 12px;
  transition:border-color .2s;
}
.search-inner:focus-within{border-color:var(--accent)}
.search-icon{font-size:16px;color:var(--text2);flex-shrink:0}
#searchbox{
  flex:1;background:none;border:none;outline:none;
  padding:10px 0;font-size:15px;color:var(--text);font-family:inherit;
}
#searchbox::placeholder{color:var(--text2)}
#search-clear{
  font-size:14px;color:var(--text2);cursor:pointer;display:none;padding:4px;
}

/* ── Content area ── */
.content-area{flex:1;display:flex;overflow:hidden;position:relative}

/* ── List view ── */
#list-view{
  flex:1;display:flex;flex-direction:column;overflow:hidden;
  background:var(--bg);
  transition:transform .28s cubic-bezier(.4,0,.2,1);
}
#song-count-bar{
  padding:6px 14px;font-size:12px;color:var(--text2);
  background:var(--surface);border-bottom:1px solid var(--border);
  display:flex;align-items:center;gap:8px;flex-shrink:0;
}
#song-count-bar .count{flex:1}
.filter-pill{
  padding:3px 10px;border-radius:20px;font-size:11px;cursor:pointer;
  background:var(--surface2);border:1px solid var(--border);color:var(--text2);
  transition:all .15s;
}
.filter-pill.active{background:var(--accent);border-color:var(--accent);color:#fff}
.filter-pill.fav-pill.active{background:var(--fav);border-color:var(--fav);color:#000}

#song-list{flex:1;overflow-y:auto;overflow-x:hidden;overscroll-behavior:contain}
.song-item{
  padding:11px 16px;border-bottom:1px solid var(--border);cursor:pointer;
  display:flex;align-items:center;gap:10px;
  transition:background .1s;
  content-visibility:auto;contain-intrinsic-size:auto 64px;
}
.song-item:active{background:var(--surface2)}
.song-item.active{background:#1a1f3a;border-left:3px solid var(--accent)}
:root[data-theme="light"] .song-item.active{background:#dde4ff}
.song-num{font-size:11px;color:var(--text2);font-family:monospace;min-width:28px;flex-shrink:0}
.song-info{flex:1;min-width:0}
.song-title{font-size:14px;color:var(--text);line-height:1.3}
.song-eng{font-size:11px;color:var(--text2);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.song-badges{display:flex;align-items:center;gap:4px;flex-shrink:0}
.badge-chord{width:8px;height:8px;background:var(--chord);border-radius:50%}
.badge-fav{color:var(--fav);font-size:13px;line-height:1}

.list-empty{padding:48px 24px;text-align:center;color:var(--text2);font-size:15px}

/* ── Detail view ── */
#detail-view{
  position:absolute;inset:0;
  background:var(--bg);overflow-y:auto;overscroll-behavior:contain;
  transform:translateX(100%);transition:transform .28s cubic-bezier(.4,0,.2,1);
  will-change:transform;
}
#detail-view.show{transform:translateX(0)}

/* On desktop: side by side */
@media(min-width:700px){
  #list-view{max-width:320px;border-right:1px solid var(--border);flex-shrink:0}
  #detail-view{position:static;transform:none !important;flex:1}
  .back-btn{display:none !important}
  .bottom-nav{display:none !important}
  .search-wrap{padding-bottom:10px}
}

.detail-inner{padding:18px 18px calc(var(--nav-h) + var(--safe-b) + 16px)}
.back-btn{
  display:flex;align-items:center;gap:6px;
  background:none;border:none;color:var(--accent);font-size:14px;
  cursor:pointer;padding:0;margin-bottom:14px;font-family:inherit;
}
.back-btn:active{opacity:.6}
.song-header{margin-bottom:16px;padding-bottom:16px;border-bottom:1px solid var(--border)}
.song-number{font-size:11px;color:var(--text2);font-family:monospace;margin-bottom:4px}
.song-tamil-title{font-size:24px;font-weight:700;line-height:1.3;color:var(--text)}
.song-eng-title{font-size:13px;color:var(--text2);margin-top:4px}
.music-chips{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}
.chip{background:var(--surface2);border:1px solid var(--border);border-radius:20px;padding:3px 12px;font-size:12px;color:var(--text2)}
.chip.key{color:var(--key-text);background:var(--key-bg);border-color:var(--key-text)}
.chip.chord-chip{color:var(--chord);border-color:var(--chord)}

/* Action bar */
.action-bar{
  display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px;
  padding:10px 14px;background:var(--surface);
  border:1px solid var(--border);border-radius:var(--radius);
}
.action-btn{
  display:flex;align-items:center;gap:5px;
  padding:7px 12px;border-radius:10px;font-size:13px;
  background:var(--surface2);border:1px solid var(--border);
  color:var(--text);cursor:pointer;font-family:inherit;
  transition:all .15s;white-space:nowrap;
}
.action-btn:active{opacity:.6}
.action-btn.on{background:var(--fav);border-color:var(--fav);color:#000}
.action-btn.set-on{background:var(--accent);border-color:var(--accent);color:#fff}
.action-btn.chord-on{background:var(--chord);border-color:var(--chord);color:#fff}

/* Transpose row */
.transpose-row{display:flex;align-items:center;gap:6px;flex-wrap:wrap;margin-bottom:16px}
.tr-label{font-size:12px;color:var(--text2)}
.tr-btn{
  width:36px;height:36px;border-radius:10px;font-size:18px;
  background:var(--surface2);border:1px solid var(--border);color:var(--text);
  cursor:pointer;display:flex;align-items:center;justify-content:center;
}
.tr-btn:active{background:var(--border)}
#transpose-value{
  font-size:14px;font-family:monospace;color:var(--accent);
  background:var(--surface2);border:1px solid var(--border);
  border-radius:8px;padding:4px 10px;min-width:44px;text-align:center;
}

/* Setlist nav */
.nav-row{display:flex;gap:8px;margin-bottom:14px}
.nav-row .nav-btn{
  flex:1;padding:10px;border-radius:12px;font-size:13px;text-align:center;
  background:var(--surface2);border:1px solid var(--border);color:var(--text);
  cursor:pointer;font-family:inherit;
}
.nav-row .nav-btn:disabled{opacity:.35;cursor:default}
.nav-row .nav-btn:active:not(:disabled){background:var(--border)}

/* Share btn */
#share-btn{margin-left:auto}

/* Lyrics */
.no-chords-note{
  font-size:12px;color:var(--text2);font-style:italic;
  padding:8px 14px;background:var(--surface2);border-radius:10px;
  border-left:3px solid var(--border);margin-bottom:14px;
}
.slide{
  background:var(--surface);border:1px solid var(--border);
  border-radius:var(--radius);padding:14px 16px;margin-bottom:10px;
}
.lyric-line{margin-bottom:4px}
.lyric-line.has-chord{overflow-x:auto;overflow-y:hidden;padding-bottom:2px}
.lyric-line.has-chord .chord-row,
.lyric-line.has-chord .lyric-text{white-space:pre}
.lyric-line.no-chord .lyric-text{white-space:pre-wrap}
.chord-row{font-family:'Consolas',monospace;color:var(--chord);font-weight:700;font-size:calc(var(--lyric-size)*.82);line-height:1.4}
.lyric-text{color:var(--text);font-size:var(--lyric-size);line-height:1.6}
.lyric-line.has-chord::-webkit-scrollbar{height:3px}
.lyric-line.has-chord::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}

/* Loading skeleton for lyrics */
.skel-line{height:18px;background:var(--surface2);border-radius:6px;margin-bottom:10px;animation:shimmer 1.2s infinite}
@keyframes shimmer{0%{opacity:.4}50%{opacity:.8}100%{opacity:.4}}

/* ── Bottom nav ── */
.bottom-nav{
  position:fixed;bottom:0;left:0;right:0;
  background:var(--surface);border-top:1px solid var(--border);
  display:flex;z-index:30;
  padding-bottom:var(--safe-b);
  padding-left:var(--safe-l);padding-right:var(--safe-r);
}
.nav-tab{
  flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:8px 4px;cursor:pointer;
  background:none;border:none;color:var(--text2);font-family:inherit;
  transition:color .15s;min-height:var(--nav-h);
}
.nav-tab.active{color:var(--accent)}
.nav-icon{font-size:20px;line-height:1;margin-bottom:3px}
.nav-label{font-size:10px}

/* ── Set list sheet ── */
#setlist-sheet{
  position:fixed;inset:0;z-index:50;
  display:flex;flex-direction:column;justify-content:flex-end;
  pointer-events:none;
}
#setlist-sheet .sheet-backdrop{
  position:absolute;inset:0;background:rgba(0,0,0,.5);
  opacity:0;transition:opacity .25s;
}
#setlist-sheet .sheet-panel{
  position:relative;z-index:1;
  background:var(--surface);border-radius:20px 20px 0 0;
  max-height:70dvh;display:flex;flex-direction:column;
  transform:translateY(100%);transition:transform .3s cubic-bezier(.4,0,.2,1);
  padding-bottom:var(--safe-b);
}
#setlist-sheet.open .sheet-backdrop{opacity:1;pointer-events:all}
#setlist-sheet.open .sheet-panel{transform:translateY(0);pointer-events:all}
#setlist-sheet.open{pointer-events:all}
.sheet-handle{width:40px;height:4px;background:var(--border);border-radius:2px;margin:10px auto}
.sheet-head{padding:4px 16px 12px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border)}
.sheet-head h3{font-size:16px}
.sheet-body{overflow-y:auto;flex:1}
.sheet-empty{padding:32px;text-align:center;color:var(--text2);font-size:14px}
.sl-item{display:flex;align-items:center;gap:8px;padding:10px 14px;border-bottom:1px solid var(--border)}
.sl-title{flex:1;font-size:13px;cursor:pointer;overflow:hidden}
.sl-n{color:var(--text2);font-family:monospace;font-size:11px}
.sl-btn{width:30px;height:30px;border-radius:8px;background:var(--surface2);border:1px solid var(--border);color:var(--text);cursor:pointer;font-size:13px;display:flex;align-items:center;justify-content:center}
.sl-btn:active{background:var(--border)}
.sl-btn:disabled{opacity:.3;cursor:default}

/* scrollbars */
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
</style>
</head>
<body>

<!-- Splash screen -->
<div id="splash">
  <img src="./logo.png" alt="Logo">
  <div class="splash-title">JHGPH Songbook</div>
  <div class="splash-sub">பாடல்கள் ஏற்றுகிறது...</div>
  <div class="progress-track"><div class="progress-fill" id="progress-fill"></div></div>
</div>

<!-- Main app -->
<div id="app">
  <!-- Header -->
  <div class="app-header">
    <div class="header-main">
      <img class="app-logo" src="./logo.png" alt="">
      <span class="app-title">JHGPH Songbook</span>
      <button class="hdr-btn" id="theme-btn" title="Theme">🌙</button>
      <button class="hdr-btn" id="install-btn" title="Install">⬇ Install</button>
    </div>
    <div class="search-wrap">
      <div class="search-inner">
        <span class="search-icon">🔍</span>
        <input id="searchbox" type="search" placeholder="பாடல் எண் அல்லது பெயர் தேடுங்கள்..." autocomplete="off" autocorrect="off">
        <span id="search-clear">✕</span>
      </div>
    </div>
  </div>

  <div class="content-area">
    <!-- List view -->
    <div id="list-view">
      <div id="song-count-bar">
        <span class="count" id="song-count">ஏற்றுகிறது...</span>
        <span class="filter-pill" id="chords-pill" onclick="toggleFilter('chords')">🎸 Chords</span>
        <span class="filter-pill fav-pill" id="fav-pill" onclick="toggleFilter('favs')">★ Favs</span>
      </div>
      <div id="song-list"></div>
    </div>

    <!-- Detail view -->
    <div id="detail-view">
      <div class="detail-inner" id="detail-inner">
        <div class="list-empty" style="margin-top:30vh">ஒரு பாடலை தேர்ந்தெடுக்கவும்</div>
      </div>
    </div>
  </div>

  <!-- Bottom nav (mobile only) -->
  <nav class="bottom-nav">
    <button class="nav-tab active" id="tab-songs" onclick="goHome()">
      <span class="nav-icon">♪</span>
      <span class="nav-label">பாடல்கள்</span>
    </button>
    <button class="nav-tab" id="tab-chords" onclick="toggleFilter('chords')">
      <span class="nav-icon">🎸</span>
      <span class="nav-label">Chords</span>
    </button>
    <button class="nav-tab" id="tab-favs" onclick="toggleFilter('favs')">
      <span class="nav-icon">★</span>
      <span class="nav-label">Favourites</span>
    </button>
    <button class="nav-tab" id="tab-set" onclick="openSetlistSheet()">
      <span class="nav-icon">📋</span>
      <span class="nav-label">Set list <span id="setlist-badge"></span></span>
    </button>
  </nav>
</div>

<!-- Set list bottom sheet -->
<div id="setlist-sheet">
  <div class="sheet-backdrop" onclick="closeSetlistSheet()"></div>
  <div class="sheet-panel">
    <div class="sheet-handle"></div>
    <div class="sheet-head">
      <h3>📋 Set List</h3>
      <div style="display:flex;gap:8px">
        <button class="sl-btn" onclick="clearSetlist()" style="width:auto;padding:0 10px;font-size:12px">Clear</button>
        <button class="sl-btn" onclick="closeSetlistSheet()">✕</button>
      </div>
    </div>
    <div class="sheet-body" id="setlist-body"></div>
  </div>
</div>

<script>
// ── Constants ──
const CHROMATIC = ['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];
const ENHARMONIC = {'Db':'C#','Eb':'D#','Fb':'E','Gb':'F#','Ab':'G#','Bb':'A#','Cb':'B'};
function transposeChord(c,s){if(!c||!s)return c;return c.replace(/[A-G][b#]?/g,n=>{const k=ENHARMONIC[n]||n,i=CHROMATIC.indexOf(k);return i<0?n:CHROMATIC[((i+s)%12+12)%12]})}
function transposeLine(l,s){if(!l||!s)return l;return l.replace(/[A-G][b#]?(?:m|maj|min|aug|dim|sus|add)?[0-9]?(?:\/[A-G][b#]?)?/g,c=>transposeChord(c,s))}
function escHtml(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}

// ── State ──
let INDEX = [];       // lightweight list (from songs-index.json)
let DETAIL = {};      // id→full song data (from songs.json), populated lazily
let fullLoaded = false;
let fullSongs = null; // full array once loaded

let filtered = [];
let activeSong = null, currentTranspose = 0, showChords = true;
let chordsOnly = false, favOnly = false;
let activeTab = 'songs'; // 'songs' | 'chords' | 'favs'
let favs = new Set(JSON.parse(localStorage.getItem('njp-favs')||'[]'));
let setlist = JSON.parse(localStorage.getItem('njp-setlist')||'[]');
let fontSize = parseInt(localStorage.getItem('njp-fontsize')||'17',10);
let wakeLock = null;

function saveFavs(){localStorage.setItem('njp-favs',JSON.stringify([...favs]))}
function saveSetlist(){localStorage.setItem('njp-setlist',JSON.stringify(setlist));updateSetBadge()}
function applyFontSize(){document.documentElement.style.setProperty('--lyric-size',fontSize+'px')}

// ── Boot: load index first, then full data ──
(function boot(){
  applyTheme(localStorage.getItem('njp-theme')||'dark');
  applyFontSize();
  updateSetBadge();

  // Restore saved tab
  const savedTab = localStorage.getItem('njp-active-tab')||'songs';
  setActiveTab(savedTab, false); // false = don't re-run applyFilters yet

  const fill = document.getElementById('progress-fill');
  fill.style.width='20%';

  fetch('./songs-index.json')
    .then(r=>r.json())
    .then(data=>{
      INDEX = data;
      fill.style.width='60%';
      applyFilters();
      fill.style.width='90%';
      setTimeout(()=>{
        document.getElementById('splash').classList.add('hidden');
        fill.style.width='100%';
      },200);

      // Load full data in background for lyrics
      fetch('./songs.json')
        .then(r=>r.json())
        .then(songs=>{
          fullSongs = songs;
          fullLoaded = true;
          // Build lookup
          songs.forEach(s=>{DETAIL[s.id]=s});
          // If a song is open and was waiting for lyrics, refresh it
          if(activeSong){
            const full = DETAIL[activeSong.id];
            if(full && !activeSong._fullLoaded){
              activeSong = {...activeSong,...full,_fullLoaded:true};
              renderDetail(activeSong);
            }
          }
        })
        .catch(()=>{});
    })
    .catch(()=>{
      document.getElementById('splash').querySelector('.splash-sub').textContent='ஏற்றுவதில் பிழை உள்ளது.';
    });
})();

// ── Filters ──
function applyFilters(){
  const q = document.getElementById('searchbox').value.trim().toLowerCase();
  document.getElementById('search-clear').style.display = q ? 'block' : 'none';
  let list = INDEX;
  if(chordsOnly) list = list.filter(s=>s.c);
  if(favOnly)    list = list.filter(s=>favs.has(s.i));
  if(q) list = list.filter(s=>{
    const n=String(s.n||'');
    return n===q||n.startsWith(q)||
      (s.t||'').toLowerCase().includes(q)||
      (s.e||'').toLowerCase().includes(q);
  });
  filtered = list;
  renderList(list);
  updateCountBar(list.length);
}

document.getElementById('searchbox').addEventListener('input',applyFilters);
document.getElementById('search-clear').addEventListener('click',()=>{
  document.getElementById('searchbox').value='';applyFilters();
});

// ── Tab management ──
function setActiveTab(tab, runFilters=true){
  activeTab = tab;
  chordsOnly = tab==='chords';
  favOnly    = tab==='favs';
  localStorage.setItem('njp-active-tab', tab);
  localStorage.setItem('njp-chords-only', chordsOnly?'1':'0');
  document.getElementById('tab-songs').classList.toggle('active', tab==='songs');
  document.getElementById('tab-chords').classList.toggle('active', tab==='chords');
  document.getElementById('tab-favs').classList.toggle('active', tab==='favs');
  document.getElementById('chords-pill').classList.toggle('active', chordsOnly);
  document.getElementById('fav-pill').classList.toggle('active', favOnly);
  if(runFilters) applyFilters();
}

function toggleFilter(type){
  if(type==='chords') setActiveTab(activeTab==='chords'?'songs':'chords');
  else                setActiveTab(activeTab==='favs' ?'songs':'favs');
}

function updateCountBar(n){
  document.getElementById('song-count').textContent=`${n} / ${INDEX.length} பாடல்கள்`;
}

// ── Render list ──
function renderList(songs){
  const el = document.getElementById('song-list');
  if(!songs.length){
    el.innerHTML='<div class="list-empty">பாடல்கள் கிடைக்கவில்லை</div>';return;
  }
  el.innerHTML = songs.map(s=>`
    <div class="song-item" data-id="${s.i}" onclick="openSong(${s.i})">
      <div class="song-num">${s.n||'—'}</div>
      <div class="song-info">
        <div class="song-title">${escHtml(s.t||s.e||'')}</div>
        ${s.e&&s.e!==s.t?`<div class="song-eng">${escHtml(s.e)}</div>`:''}
      </div>
      <div class="song-badges">
        ${s.c?'<div class="badge-chord"></div>':''}
        ${favs.has(s.i)?'<div class="badge-fav">★</div>':''}
      </div>
    </div>`).join('');
}

// ── Open song ──
function openSong(id){
  // Mark active in list
  document.querySelectorAll('.song-item').forEach(el=>el.classList.remove('active'));
  const item = document.querySelector(`.song-item[data-id="${id}"]`);
  if(item){item.classList.add('active');item.scrollIntoView({block:'nearest'})}

  // Get data: use full if available, else use index entry
  const idx = INDEX.find(s=>s.i===id);
  const full = DETAIL[id];
  activeSong = full ? {...full,_fullLoaded:true} : {id,...(idx||{}), i:id, _fullLoaded:false};
  currentTranspose = 0;
  showChords = true;

  renderDetail(activeSong);
  showDetailView();
  acquireWakeLock();
  history.pushState({songId:id},'','#song-'+id);
}

// ── Render detail ──
function renderDetail(song){
  const id = song.id || song.i;
  const title = song.title || song.t || song.name || song.e || '';
  const engTitle = song.name || song.e || '';
  const num = song.num || song.n || '';
  const key = song.key || song.k || '';
  const hasChords = !!(song.chords && song.chord_lyrics);
  const isFav = favs.has(id);
  const inSet = setlist.includes(id);

  let chips = '';
  if(key) chips += `<span class="chip key">🎵 ${escHtml(key)}</span>`;
  if(hasChords) chips += `<span class="chip chord-chip">🎸 Chords</span>`;

  // Setlist nav
  const si = setlist.indexOf(id);
  const navRow = (si!==-1&&setlist.length>1)?`
    <div class="nav-row">
      <button class="nav-btn" onclick="setlistNav(-1)" ${si===0?'disabled':''}>‹ Prev</button>
      <button class="nav-btn" onclick="setlistNav(1)" ${si===setlist.length-1?'disabled':''}>Next ›</button>
    </div>`:'';

  const transposeHtml = hasChords ? `
    <div class="transpose-row">
      <button class="action-btn ${showChords?'chord-on':''}" id="chords-vis-btn" onclick="toggleChordsVis()">🎸 ${showChords?'ON':'OFF'}</button>
      <span class="tr-label">Key</span>
      <button class="tr-btn" onclick="changeTranspose(-1)">−</button>
      <div id="transpose-value">0</div>
      <button class="tr-btn" onclick="changeTranspose(+1)">+</button>
      <button class="tr-btn" onclick="changeTranspose(0,'reset')" style="font-size:13px">↺</button>
    </div>` : '';

  const shareHtml = 'share' in navigator ? `<button class="action-btn" id="share-btn" onclick="shareSong()">↗ Share</button>` : '';

  document.getElementById('detail-inner').innerHTML = `
    <button class="back-btn" onclick="goBack()">← Back</button>
    <div class="song-header">
      ${num?`<div class="song-number">பாடல் — ${num}</div>`:''}
      <div class="song-tamil-title">${escHtml(title)}</div>
      ${engTitle&&engTitle!==title?`<div class="song-eng-title">${escHtml(engTitle)}</div>`:''}
      ${chips?`<div class="music-chips">${chips}</div>`:''}
    </div>
    <div class="action-bar">
      <button class="action-btn ${isFav?'on':''}" id="fav-btn" onclick="toggleFav(${id})">${isFav?'★':'☆'} ${isFav?'Saved':'Favourite'}</button>
      <button class="action-btn ${inSet?'set-on':''}" id="set-btn" onclick="toggleSetlist(${id})">${inSet?'✓ In set':'＋ Set list'}</button>
      <button class="action-btn" onclick="changeFont(-1)">A−</button>
      <button class="action-btn" onclick="changeFont(1)">A+</button>
      ${shareHtml}
    </div>
    ${transposeHtml}
    ${navRow}
    <div id="lyrics-body"></div>`;

  if(song._fullLoaded){
    renderLyrics();
  } else {
    // Show skeleton while full data loads
    document.getElementById('lyrics-body').innerHTML =
      '<div class="slide">' +
      Array.from({length:6},(_,i)=>`<div class="skel-line" style="width:${60+Math.random()*35}%"></div>`).join('') +
      '</div>'.repeat(3);
    // Poll until full data arrives
    const waitFull = setInterval(()=>{
      if(DETAIL[id]){
        clearInterval(waitFull);
        const updated = {...DETAIL[id],_fullLoaded:true};
        if(activeSong && (activeSong.id===id||activeSong.i===id)){
          activeSong = updated;
          renderLyrics();
        }
      }
    },200);
  }
}

// ── Render lyrics ──
function buildSlides(lyricsStr,chordsStr,steps){
  if(!lyricsStr)return[];
  const L=lyricsStr.split('<slide>'),C=chordsStr?chordsStr.split('<slide>'):[];
  return L.map((blk,si)=>{
    const lines=blk.split('<BR>').filter(l=>l.trim());
    const cl=(C[si]||'').split(/<br>/i);
    return lines.map((lyric,li)=>{
      let chord=(cl[li]||'').trimEnd();
      if(chord&&steps)chord=transposeLine(chord,steps);
      return{lyric,chord};
    });
  });
}

function renderLyrics(){
  const body=document.getElementById('lyrics-body');
  if(!body||!activeSong)return;
  const hasChords=!!(activeSong.chords&&activeSong.chord_lyrics);
  const slides=buildSlides(
    hasChords?activeSong.chord_lyrics:activeSong.lyrics,
    hasChords?activeSong.chords:'',
    currentTranspose
  );
  if(!slides.length){
    body.innerHTML='<div class="no-chords-note">இந்த பாடலுக்கு lyrics இல்லை</div>';return;
  }
  if(!hasChords){
    body.innerHTML=`<div class="no-chords-note">Chords இல்லை — lyrics மட்டுமே காட்டப்படுகிறது</div>`+
      slides.map(lines=>`<div class="slide">${lines.map(({lyric})=>
        `<div class="lyric-line no-chord"><div class="lyric-text">${escHtml(lyric)}</div></div>`
      ).join('')}</div>`).join('');
    return;
  }
  body.innerHTML=slides.map(lines=>`<div class="slide">${
    lines.map(({lyric,chord})=>{
      const dc=showChords&&chord;
      return`<div class="lyric-line ${dc?'has-chord':'no-chord'}">
        ${dc?`<div class="chord-row">${escHtml(chord)}</div>`:''}
        <div class="lyric-text">${escHtml(lyric)}</div>
      </div>`;
    }).join('')
  }</div>`).join('');
  const tv=document.getElementById('transpose-value');
  if(tv)tv.textContent=currentTranspose>=0?'+'+currentTranspose:''+currentTranspose;
}

function changeTranspose(d,mode){
  if(mode==='reset')currentTranspose=0;else currentTranspose+=d;
  renderLyrics();
}
function toggleChordsVis(){
  showChords=!showChords;
  const b=document.getElementById('chords-vis-btn');
  if(b){b.classList.toggle('chord-on',showChords);b.textContent='🎸 '+(showChords?'ON':'OFF')}
  renderLyrics();
}
function changeFont(d){fontSize=Math.max(13,Math.min(30,fontSize+d));localStorage.setItem('njp-fontsize',fontSize);applyFontSize()}

// ── Navigation ──
function showDetailView(){
  document.getElementById('detail-view').classList.add('show');
  // Don't change tab active state — keep it so back restores correctly
}
function goBack(){
  document.getElementById('detail-view').classList.remove('show');
  releaseWakeLock();
  // Restore the tab that was active before opening the song
  document.getElementById('tab-songs').classList.toggle('active', activeTab==='songs');
  document.getElementById('tab-chords').classList.toggle('active', activeTab==='chords');
  document.getElementById('tab-favs').classList.toggle('active', activeTab==='favs');
  history.back();
}
function goHome(){
  document.getElementById('detail-view').classList.remove('show');
  releaseWakeLock();
  setActiveTab('songs');
}

window.addEventListener('popstate',e=>{
  if(!e.state?.songId){
    document.getElementById('detail-view').classList.remove('show');
    releaseWakeLock();
    // Restore correct tab — don't blindly force Songs tab
    document.getElementById('tab-songs').classList.toggle('active', activeTab==='songs');
    document.getElementById('tab-chords').classList.toggle('active', activeTab==='chords');
    document.getElementById('tab-favs').classList.toggle('active', activeTab==='favs');
  }
});

// Swipe right to go back
(function swipeBack(){
  let sx=0,sy=0;
  document.getElementById('detail-view').addEventListener('touchstart',e=>{
    sx=e.touches[0].clientX;sy=e.touches[0].clientY;
  },{passive:true});
  document.getElementById('detail-view').addEventListener('touchend',e=>{
    const dx=e.changedTouches[0].clientX-sx;
    const dy=Math.abs(e.changedTouches[0].clientY-sy);
    if(dx>60&&dy<50&&sx<40)goBack();
  },{passive:true});
})();

// ── Theme ──
function applyTheme(t){
  document.documentElement.setAttribute('data-theme',t);
  document.getElementById('theme-btn').textContent=t==='light'?'☀️':'🌙';
  localStorage.setItem('njp-theme',t);
}
document.getElementById('theme-btn').addEventListener('click',()=>{
  applyTheme((document.documentElement.getAttribute('data-theme')||'dark')==='dark'?'light':'dark');
});

// ── Favourites ──
function toggleFav(id){
  if(favs.has(id))favs.delete(id);else favs.add(id);
  saveFavs();
  const b=document.getElementById('fav-btn');
  if(b){const on=favs.has(id);b.classList.toggle('on',on);b.textContent=(on?'★ Saved':'☆ Favourite')}
  // Refresh badge in list
  const li=document.querySelector(`.song-item[data-id="${id}"] .badge-fav`);
  if(favs.has(id)&&!li){const badges=document.querySelector(`.song-item[data-id="${id}"] .song-badges`);if(badges)badges.insertAdjacentHTML('beforeend','<div class="badge-fav">★</div>')}
  else if(!favs.has(id)&&li)li.remove();
  if(favOnly)applyFilters();
}

// ── Set list ──
function toggleSetlist(id){
  const i=setlist.indexOf(id);
  if(i===-1)setlist.push(id);else setlist.splice(i,1);
  saveSetlist();
  if(activeSong&&(activeSong.id===id||activeSong.i===id))renderDetail(activeSong);
  renderSetlist();
  if(navigator.vibrate)navigator.vibrate(20);
}
function updateSetBadge(){
  const b=document.getElementById('setlist-badge');
  if(b)b.textContent=setlist.length?'('+setlist.length+')':'';
}
function openSetlistSheet(){document.getElementById('setlist-sheet').classList.add('open');renderSetlist()}
function closeSetlistSheet(){document.getElementById('setlist-sheet').classList.remove('open')}
function clearSetlist(){if(confirm('Set list அழிக்கவா?')){setlist=[];saveSetlist();renderSetlist();if(activeSong)renderDetail(activeSong)}}
function renderSetlist(){
  const body=document.getElementById('setlist-body');
  if(!setlist.length){body.innerHTML='<div class="sheet-empty">Set list காலியாக உள்ளது.<br>ஒரு பாடலை திறந்து "＋ Set list" அழுத்துங்கள்.</div>';return}
  const getTitle=id=>{const s=DETAIL[id]||INDEX.find(x=>x.i===id);return s?escHtml(s.title||s.t||s.name||s.e||'—'):'—'};
  const getNum=id=>{const s=DETAIL[id]||INDEX.find(x=>x.i===id);return s?s.num||s.n||'—':'—'};
  body.innerHTML=setlist.map((id,i)=>`
    <div class="sl-item">
      <div class="sl-title" onclick="openSong(${id});closeSetlistSheet()">
        <span class="sl-n">${getNum(id)}</span> ${getTitle(id)}
      </div>
      <button class="sl-btn" onclick="moveSet(${i},-1)" ${i===0?'disabled':''}>▲</button>
      <button class="sl-btn" onclick="moveSet(${i},1)" ${i===setlist.length-1?'disabled':''}>▼</button>
      <button class="sl-btn" onclick="removeSet(${id})">✕</button>
    </div>`).join('');
}
function moveSet(i,d){const j=i+d;if(j<0||j>=setlist.length)return;[setlist[i],setlist[j]]=[setlist[j],setlist[i]];saveSetlist();renderSetlist()}
function removeSet(id){setlist=setlist.filter(x=>x!==id);saveSetlist();renderSetlist();if(activeSong&&(activeSong.id===id||activeSong.i===id))renderDetail(activeSong)}
function setlistNav(d){
  if(!activeSong)return;
  const id=activeSong.id||activeSong.i;
  const i=setlist.indexOf(id);if(i===-1)return;
  const j=i+d;if(j<0||j>=setlist.length)return;
  openSong(setlist[j]);
}

// ── Share ──
function shareSong(){
  if(!activeSong)return;
  const title=activeSong.title||activeSong.t||activeSong.name||activeSong.e||'Song';
  navigator.share&&navigator.share({title,text:title+' — JHGPH Songbook'}).catch(()=>{});
}

// ── WakeLock ──
async function acquireWakeLock(){
  if(!('wakeLock' in navigator))return;
  try{wakeLock=await navigator.wakeLock.request('screen')}catch(e){}
}
function releaseWakeLock(){if(wakeLock){wakeLock.release();wakeLock=null}}
document.addEventListener('visibilitychange',()=>{if(document.hidden)releaseWakeLock();else if(activeSong)acquireWakeLock()});

// ── Install prompt ──
let deferredPrompt=null;
window.addEventListener('beforeinstallprompt',e=>{
  e.preventDefault();deferredPrompt=e;
  document.getElementById('install-btn').style.display='flex';
});
document.getElementById('install-btn').addEventListener('click',async()=>{
  if(!deferredPrompt)return;
  deferredPrompt.prompt();await deferredPrompt.userChoice;
  deferredPrompt=null;document.getElementById('install-btn').style.display='none';
});
window.addEventListener('appinstalled',()=>document.getElementById('install-btn').style.display='none');

// ── Service worker ──
if('serviceWorker' in navigator)
  window.addEventListener('load',()=>navigator.serviceWorker.register('./sw.js').catch(()=>{}));
</script>
