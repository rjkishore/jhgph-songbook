<!DOCTYPE html>
<html lang="ta">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JHGPH Songbook</title>
<link rel="manifest" href="./manifest.json">
<meta name="theme-color" content="#0f0f0f">
<link rel="apple-touch-icon" href="./icon-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<style>
  :root, :root[data-theme="dark"] {
    --bg: #0f0f0f;
    --surface: #1a1a1a;
    --surface2: #242424;
    --border: #333;
    --text: #e8e8e8;
    --text2: #999;
    --accent: #4f8ef7;
    --chord: #ff4444;
    --key-badge: #1e3a1e;
    --key-text: #4caf50;
  }

  :root[data-theme="light"] {
    --bg: #f4f5f7;
    --surface: #ffffff;
    --surface2: #eceef1;
    --border: #d5d8dd;
    --text: #1a1a1a;
    --text2: #6b7280;
    --accent: #2563eb;
    --chord: #d40000;
    --key-badge: #e3f5e3;
    --key-text: #2e7d32;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Tamil Bible', 'Latha', 'Nirmala UI', sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100dvh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 12px 16px;
    display: flex;
    gap: 10px;
    align-items: center;
    flex-wrap: wrap;
    flex-shrink: 0;
  }
  header h1 {
    font-size: 15px;
    font-weight: 700;
    color: var(--accent);
    white-space: nowrap;
  }
  .app-logo {
    height: 34px;
    width: auto;
    border-radius: 6px;
    background: #fff;
    padding: 2px 5px;
    flex-shrink: 0;
  }
  #searchbox {
    flex: 1;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 8px 12px;
    color: var(--text);
    font-size: 15px;
    font-family: inherit;
    outline: none;
  }
  #searchbox:focus { border-color: var(--accent); }
  #searchbox::placeholder { color: var(--text2); }

  #song-count { font-size: 12px; color: var(--text2); white-space: nowrap; }

  .toggle {
    display: flex;
    align-items: center;
    gap: 6px;
    cursor: pointer;
    user-select: none;
    white-space: nowrap;
  }
  .toggle input { display: none; }
  .toggle .track {
    width: 38px;
    height: 22px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 11px;
    position: relative;
    transition: background 0.2s;
    flex-shrink: 0;
  }
  .toggle .knob {
    position: absolute;
    top: 2px;
    left: 2px;
    width: 16px;
    height: 16px;
    background: var(--text2);
    border-radius: 50%;
    transition: transform 0.2s, background 0.2s;
  }
  .toggle input:checked + .track { background: var(--chord); border-color: var(--chord); }
  .toggle input:checked + .track .knob { transform: translateX(16px); background: #fff; }
  .toggle-label { font-size: 12px; color: var(--text2); }
  .toggle input:checked ~ .toggle-label { color: var(--chord); }

  #theme-btn { padding: 5px 9px; font-size: 15px; line-height: 1; }

  .main {
    display: flex;
    flex: 1;
    overflow: hidden;
  }

  #song-list {
    width: 300px;
    flex-shrink: 0;
    background: var(--surface);
    border-right: 1px solid var(--border);
    overflow-y: auto;
  }
  .song-item {
    padding: 10px 14px;
    border-bottom: 1px solid var(--border);
    cursor: pointer;
    transition: background 0.1s;
  }
  .song-item:hover { background: var(--surface2); }
  .song-item.active { background: #1a2a4a; border-left: 3px solid var(--accent); }
  .song-item .num { font-size: 11px; color: var(--text2); font-family: monospace; }
  .song-item .tamil { font-size: 14px; color: var(--text); margin-top: 2px; }
  .song-item .eng { font-size: 11px; color: var(--text2); margin-top: 1px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .badge-chord { display: inline-block; width: 6px; height: 6px; background: var(--chord); border-radius: 50%; margin-left: 4px; vertical-align: middle; }

  #song-detail {
    flex: 1;
    overflow-y: auto;
    padding: 24px;
  }
  #song-detail.empty {
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--text2);
    font-size: 18px;
  }

  .song-header {
    margin-bottom: 20px;
    padding-bottom: 16px;
    border-bottom: 1px solid var(--border);
  }
  .song-header .number { font-size: 12px; color: var(--text2); font-family: monospace; margin-bottom: 4px; }
  .song-header .tamil-title { font-size: 26px; font-weight: 700; color: var(--text); line-height: 1.3; }
  .song-header .eng-title { font-size: 14px; color: var(--text2); margin-top: 4px; }

  .music-info {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    margin: 14px 0;
  }
  .info-chip {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 4px 12px;
    font-size: 12px;
    color: var(--text2);
  }
  .info-chip.key { color: var(--key-text); background: var(--key-badge); border-color: var(--key-text); }

  .transpose-bar {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 20px;
  }
  .transpose-bar span { font-size: 12px; color: var(--text2); }
  .btn {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    border-radius: 6px;
    padding: 5px 12px;
    cursor: pointer;
    font-size: 13px;
    transition: background 0.1s;
  }
  .btn:hover { background: var(--border); }
  .btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }
  #transpose-value {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 4px 10px;
    font-size: 13px;
    font-family: monospace;
    color: var(--accent);
    min-width: 40px;
    text-align: center;
  }

  .lyrics-section { margin-bottom: 10px; }
  .slide {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 16px 20px;
    margin-bottom: 12px;
  }
  .lyric-line {
    position: relative;
    padding-top: 22px;
    margin-bottom: 6px;
    line-height: 1.6;
    font-size: 17px;
  }
  .lyric-text { color: var(--text); }
  .chord-row {
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    font-size: 13px;
    font-family: 'Consolas', monospace;
    color: var(--chord);
    font-weight: 700;
    white-space: pre;
    letter-spacing: 0;
  }
  .lyric-line.no-chord { padding-top: 0; }

  .no-chords-msg {
    color: var(--text2);
    font-size: 13px;
    font-style: italic;
    margin-bottom: 16px;
    padding: 10px 14px;
    background: var(--surface2);
    border-radius: 8px;
    border-left: 3px solid var(--border);
  }

  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  @media (max-width: 640px) {
    #song-list { width: 100%; display: none; }
    #song-list.show { display: block; }
    #song-detail { display: none; }
    #song-detail.show { display: block; }
    .back-btn { display: inline-flex !important; }
  }
  .back-btn {
    display: none;
    align-items: center;
    gap: 6px;
    background: none;
    border: none;
    color: var(--accent);
    font-size: 14px;
    cursor: pointer;
    padding: 0;
    margin-bottom: 14px;
  }
</style>
</head>
<body>

<header>
  <img src="./logo.png" alt="JHG Prayer House Cheyyar" class="app-logo">
  <input id="searchbox" type="text" placeholder="பாடல் எண் அல்லது பெயர் தேடுங்கள்..." autocomplete="off">
  <label class="toggle" title="Show only songs that have chords">
    <input type="checkbox" id="chords-only-toggle">
    <span class="track"><span class="knob"></span></span>
    <span class="toggle-label">🎸 Chords only</span>
  </label>
  <button id="theme-btn" class="btn" title="Toggle light / dark theme">🌙</button>
  <span id="song-count"></span>
</header>

<div class="main">
  <div id="song-list"></div>
  <div id="song-detail" class="empty">
    <span>ஒரு பாடலை தேர்ந்தெடுக்கவும்</span>
  </div>
</div>

<script>
const CHROMATIC = ['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];
const ENHARMONIC = {'Db':'C#','Eb':'D#','Fb':'E','Gb':'F#','Ab':'G#','Bb':'A#','Cb':'B'};

function transposeChord(chord, steps) {
  if (!chord || steps === 0) return chord;
  return chord.replace(/[A-G][b#]?/g, (note) => {
    const clean = ENHARMONIC[note] || note;
    const idx = CHROMATIC.indexOf(clean);
    if (idx === -1) return note;
    const newIdx = ((idx + steps) % 12 + 12) % 12;
    return CHROMATIC[newIdx];
  });
}

function transposeLine(chordLine, steps) {
  if (!chordLine || steps === 0) return chordLine;
  return chordLine.replace(/[A-G][b#]?(?:m|maj|min|aug|dim|sus|add)?[0-9]?(?:\/[A-G][b#]?)?/g,
    (c) => transposeChord(c, steps));
}

let ALL_SONGS = [];
let currentTranspose = 0;
let activeSong = null;
let chordsOnly = false;

fetch('./songs.json')
  .then(r => r.json())
  .then(data => {
    ALL_SONGS = data;
    applyFilters();
  });

function applyFilters() {
  const q = document.getElementById('searchbox').value.trim().toLowerCase();
  let list = ALL_SONGS;

  if (chordsOnly) list = list.filter(s => s.chords);

  if (q) {
    list = list.filter(s =>
      s.num === q ||
      s.num.startsWith(q) ||
      s.name.toLowerCase().includes(q) ||
      s.title.includes(q)
    );
  }

  renderList(list);
  const label = chordsOnly ? ' (chords)' : '';
  document.getElementById('song-count').textContent = list.length + ' / ' + ALL_SONGS.length + label;
}

document.getElementById('searchbox').addEventListener('input', applyFilters);

document.getElementById('chords-only-toggle').addEventListener('change', function() {
  chordsOnly = this.checked;
  localStorage.setItem('njp-chords-only', chordsOnly ? '1' : '0');
  applyFilters();
});

function applyTheme(theme) {
  document.documentElement.setAttribute('data-theme', theme);
  document.getElementById('theme-btn').textContent = theme === 'light' ? '☀️' : '🌙';
  localStorage.setItem('njp-theme', theme);
}
document.getElementById('theme-btn').addEventListener('click', function() {
  const cur = document.documentElement.getAttribute('data-theme') || 'dark';
  applyTheme(cur === 'dark' ? 'light' : 'dark');
});

(function restorePrefs() {
  const savedTheme = localStorage.getItem('njp-theme') || 'dark';
  applyTheme(savedTheme);
  if (localStorage.getItem('njp-chords-only') === '1') {
    chordsOnly = true;
    document.getElementById('chords-only-toggle').checked = true;
  }
})();

function renderList(songs) {
  const el = document.getElementById('song-list');
  el.innerHTML = songs.map(s => `
    <div class="song-item" data-id="${s.id}" onclick="openSong(${s.id})">
      <div class="num">${s.num || '—'}${s.chords ? '<span class="badge-chord" title="Chords available"></span>' : ''}</div>
      <div class="tamil">${s.title || s.name}</div>
      <div class="eng">${s.name}</div>
    </div>
  `).join('');
}

function openSong(id) {
  const song = ALL_SONGS.find(s => s.id === id);
  if (!song) return;
  activeSong = song;
  currentTranspose = 0;

  document.querySelectorAll('.song-item').forEach(el => el.classList.remove('active'));
  const item = document.querySelector(`.song-item[data-id="${id}"]`);
  if (item) { item.classList.add('active'); item.scrollIntoView({block:'nearest'}); }

  renderDetail(song);

  document.getElementById('song-list').classList.remove('show');
  document.getElementById('song-detail').classList.add('show');
}

function parseNotes(notes) {
  if (!notes) return {};
  const parts = notes.split('/');
  return {
    key: parts[0] || '',
    style: parts[1] || '',
    tempo: (parts.find(p => p.startsWith('T-')) || '').replace('T-','')
  };
}

function buildSlides(lyricsStr, chordsStr, transposeSteps) {
  if (!lyricsStr) return [];
  const lyricSlides = lyricsStr.split('<slide>');
  const chordSlides = chordsStr ? chordsStr.split('<slide>') : [];

  return lyricSlides.map((lyricBlock, si) => {
    const lyricLines = lyricBlock.split('<BR>').filter(l => l.trim());
    const chordBlock = chordSlides[si] || '';
    const chordLines = chordBlock.split(/<br>/i);

    return lyricLines.map((lyric, li) => {
      let chord = (chordLines[li] || '').trimEnd();
      if (chord && transposeSteps !== 0) chord = transposeLine(chord, transposeSteps);
      return { lyric, chord };
    });
  });
}

function renderDetail(song) {
  const detail = document.getElementById('song-detail');
  detail.classList.remove('empty');

  const info = parseNotes(song.notes);
  const key = song.key || info.key || '';
  const style = info.style || '';
  const tempo = info.tempo || '';

  const hasChords = !!(song.chords && song.chord_lyrics);

  let chips = '';
  if (key)   chips += `<span class="info-chip key">🎵 ${key}</span>`;
  if (tempo) chips += `<span class="info-chip">♩ ${tempo} BPM</span>`;
  if (style) chips += `<span class="info-chip">🎼 ${style}</span>`;
  if (hasChords) chips += `<span class="info-chip" style="color:#ff4444;border-color:#ff4444">🎸 Chords</span>`;

  const transposeBar = hasChords ? `
    <div class="transpose-bar">
      <span>Transpose:</span>
      <button class="btn" onclick="changeTranspose(-1)">−</button>
      <div id="transpose-value">0</div>
      <button class="btn" onclick="changeTranspose(+1)">+</button>
      <button class="btn" onclick="changeTranspose(0,'reset')" style="font-size:11px">Reset</button>
    </div>` : '';

  detail.innerHTML = `
    <button class="back-btn" onclick="showList()">← Back</button>
    <div class="song-header">
      <div class="number">பாடல் — ${song.num || '?'}</div>
      <div class="tamil-title">${song.title || song.name}</div>
      <div class="eng-title">${song.name}</div>
      ${chips ? `<div class="music-info">${chips}</div>` : ''}
    </div>
    ${transposeBar}
    ${!hasChords ? '<div class="no-chords-msg">இந்த பாடலுக்கு chords இல்லை — lyrics மட்டுமே</div>' : ''}
    <div class="lyrics-section" id="lyrics-body"></div>
  `;

  renderLyrics();
}

function renderLyrics() {
  if (!activeSong) return;
  const body = document.getElementById('lyrics-body');
  if (!body) return;

  const hasChords = !!(activeSong.chords && activeSong.chord_lyrics);
  const lyricsStr = hasChords ? activeSong.chord_lyrics : activeSong.lyrics;
  const chordsStr = hasChords ? activeSong.chords : '';

  const slides = buildSlides(lyricsStr, chordsStr, currentTranspose);

  body.innerHTML = slides.map(lines => `
    <div class="slide">
      ${lines.map(({lyric, chord}) => `
        <div class="lyric-line${chord ? '' : ' no-chord'}">
          ${chord ? `<div class="chord-row">${escHtml(chord)}</div>` : ''}
          <div class="lyric-text">${escHtml(lyric)}</div>
        </div>
      `).join('')}
    </div>
  `).join('');

  const tv = document.getElementById('transpose-value');
  if (tv) tv.textContent = currentTranspose >= 0 ? '+' + currentTranspose : '' + currentTranspose;
}

function changeTranspose(delta, mode) {
  if (mode === 'reset') currentTranspose = 0;
  else currentTranspose += delta;
  renderLyrics();
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function showList() {
  document.getElementById('song-list').classList.add('show');
  document.getElementById('song-detail').classList.remove('show');
}

if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./sw.js').catch(err =>
      console.warn('SW registration failed:', err)
    );
  });
}
</script>
</body>
</html>
