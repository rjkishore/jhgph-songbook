<!DOCTYPE html>
<html lang="ta">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JHGPH Songbook</title>
<link rel="manifest" href="./manifest.json">
<meta name="theme-color" content="#0f0f0f">
<link rel="apple-touch-icon" href="./icon-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<style>
  /* ── Bundled Tamil font (offline) ── */
  @font-face {
    font-family: 'Noto Sans Tamil';
    font-style: normal; font-weight: 400; font-display: swap;
    src: url('./fonts/notosanstamil-tamil.woff2') format('woff2');
    unicode-range: U+0964-0965, U+0B82-0BFA, U+200C-200D, U+20B9, U+25CC;
  }
  @font-face {
    font-family: 'Noto Sans Tamil';
    font-style: normal; font-weight: 700; font-display: swap;
    src: url('./fonts/notosanstamil-tamil.woff2') format('woff2');
    unicode-range: U+0964-0965, U+0B82-0BFA, U+200C-200D, U+20B9, U+25CC;
  }
  @font-face {
    font-family: 'Noto Sans Tamil';
    font-style: normal; font-weight: 400; font-display: swap;
    src: url('./fonts/notosanstamil-latin.woff2') format('woff2');
    unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+2000-206F, U+2191, U+2193, U+2212;
  }
  @font-face {
    font-family: 'Noto Sans Tamil';
    font-style: normal; font-weight: 700; font-display: swap;
    src: url('./fonts/notosanstamil-latin.woff2') format('woff2');
    unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+2000-206F, U+2191, U+2193, U+2212;
  }

  :root, :root[data-theme="dark"] {
    --bg: #0f0f0f; --surface: #1a1a1a; --surface2: #242424; --border: #333;
    --text: #e8e8e8; --text2: #999; --accent: #4f8ef7; --chord: #ff4444;
    --key-badge: #1e3a1e; --key-text: #4caf50; --fav: #ffb400;
    --lyric-size: 17px;
  }
  :root[data-theme="light"] {
    --bg: #f4f5f7; --surface: #ffffff; --surface2: #eceef1; --border: #d5d8dd;
    --text: #1a1a1a; --text2: #6b7280; --accent: #2563eb; --chord: #d40000;
    --key-badge: #e3f5e3; --key-text: #2e7d32; --fav: #e69a00;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Noto Sans Tamil', 'Latha', 'Nirmala UI', sans-serif;
    background: var(--bg); color: var(--text);
    height: 100dvh; display: flex; flex-direction: column; overflow: hidden;
  }

  header {
    background: var(--surface); border-bottom: 1px solid var(--border);
    padding: 10px 14px; display: flex; gap: 8px; align-items: center;
    flex-wrap: wrap; flex-shrink: 0;
  }
  .app-logo {
    height: 34px; width: auto; border-radius: 6px; background: #fff;
    padding: 2px 5px; flex-shrink: 0;
  }
  #searchbox {
    flex: 1; min-width: 140px; background: var(--surface2);
    border: 1px solid var(--border); border-radius: 8px; padding: 8px 12px;
    color: var(--text); font-size: 15px; font-family: inherit; outline: none;
  }
  #searchbox:focus { border-color: var(--accent); }
  #searchbox::placeholder { color: var(--text2); }
  #song-count { font-size: 12px; color: var(--text2); white-space: nowrap; }

  .toggle { display: flex; align-items: center; gap: 6px; cursor: pointer; user-select: none; white-space: nowrap; }
  .toggle input { display: none; }
  .toggle .track {
    width: 38px; height: 22px; background: var(--surface2);
    border: 1px solid var(--border); border-radius: 11px; position: relative;
    transition: background 0.2s; flex-shrink: 0;
  }
  .toggle .knob {
    position: absolute; top: 2px; left: 2px; width: 16px; height: 16px;
    background: var(--text2); border-radius: 50%;
    transition: transform 0.2s, background 0.2s;
  }
  .toggle input:checked + .track { background: var(--chord); border-color: var(--chord); }
  .toggle input:checked + .track .knob { transform: translateX(16px); background: #fff; }
  .toggle-label { font-size: 12px; color: var(--text2); }
  .toggle input:checked ~ .toggle-label { color: var(--chord); }

  .btn {
    background: var(--surface2); border: 1px solid var(--border); color: var(--text);
    border-radius: 6px; padding: 5px 10px; cursor: pointer; font-size: 13px;
    font-family: inherit; transition: background 0.1s; white-space: nowrap;
  }
  .btn:hover { background: var(--border); }
  .btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }
  .icon-btn { padding: 5px 9px; font-size: 15px; line-height: 1; }
  #fav-filter-btn.active { background: var(--fav); border-color: var(--fav); color: #000; }
  #install-btn { display: none; background: var(--accent); border-color: var(--accent); color: #fff; }

  .main { display: flex; flex: 1; overflow: hidden; position: relative; }

  #song-list {
    width: 300px; flex-shrink: 0; background: var(--surface);
    border-right: 1px solid var(--border); overflow-y: auto;
  }
  .song-item { padding: 10px 14px; border-bottom: 1px solid var(--border); cursor: pointer; transition: background 0.1s; }
  .song-item:hover { background: var(--surface2); }
  .song-item.active { background: #1a2a4a; border-left: 3px solid var(--accent); }
  :root[data-theme="light"] .song-item.active { background: #dbe7ff; }
  .song-item .num { font-size: 11px; color: var(--text2); font-family: monospace; }
  .song-item .tamil { font-size: 14px; color: var(--text); margin-top: 2px; }
  .song-item .eng { font-size: 11px; color: var(--text2); margin-top: 1px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .badge-chord { display: inline-block; width: 6px; height: 6px; background: var(--chord); border-radius: 50%; margin-left: 4px; vertical-align: middle; }
  .badge-fav { color: var(--fav); font-size: 11px; margin-left: 3px; }

  #song-detail { flex: 1; overflow-y: auto; padding: 20px 24px; }
  #song-detail.empty { display: flex; align-items: center; justify-content: center; color: var(--text2); font-size: 18px; }

  .song-header { margin-bottom: 14px; padding-bottom: 14px; border-bottom: 1px solid var(--border); }
  .song-header .number { font-size: 12px; color: var(--text2); font-family: monospace; margin-bottom: 4px; }
  .song-header .tamil-title { font-size: 25px; font-weight: 700; color: var(--text); line-height: 1.3; }
  .song-header .eng-title { font-size: 14px; color: var(--text2); margin-top: 4px; }

  .music-info { display: flex; gap: 10px; flex-wrap: wrap; margin: 12px 0; }
  .info-chip { background: var(--surface2); border: 1px solid var(--border); border-radius: 20px; padding: 4px 12px; font-size: 12px; color: var(--text2); }
  .info-chip.key { color: var(--key-text); background: var(--key-badge); border-color: var(--key-text); }

  /* Song toolbar (fav / setlist / font size / transpose) */
  .toolbar { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; margin-bottom: 18px; }
  .toolbar .group { display: flex; align-items: center; gap: 4px; background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 3px 6px; }
  .toolbar .group > span { font-size: 11px; color: var(--text2); margin: 0 2px; }
  .tbtn { background: var(--surface2); border: 1px solid var(--border); color: var(--text); border-radius: 6px; padding: 4px 10px; cursor: pointer; font-size: 13px; font-family: inherit; }
  .tbtn:hover { background: var(--border); }
  .tbtn.on { background: var(--fav); border-color: var(--fav); color: #000; }
  .tbtn.set-on { background: var(--accent); border-color: var(--accent); color: #fff; }
  #transpose-value { background: var(--surface2); border: 1px solid var(--border); border-radius: 6px; padding: 4px 10px; font-size: 13px; font-family: monospace; color: var(--accent); min-width: 40px; text-align: center; }

  .nav-row { display: flex; gap: 8px; margin-bottom: 14px; }
  .nav-row .btn { flex: 1; text-align: center; }

  .slide { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 14px 18px; margin-bottom: 12px; }

  /* Chorded line: chord row above lyric, both nowrap, horizontally scrollable so
     nothing wraps and chord/lyric stay aligned. */
  .lyric-line { margin-bottom: 4px; }
  .lyric-line.has-chord { overflow-x: auto; overflow-y: hidden; padding-bottom: 2px; }
  .lyric-line.has-chord .chord-row,
  .lyric-line.has-chord .lyric-text { white-space: pre; }
  .lyric-line.no-chord .lyric-text { white-space: pre-wrap; }
  .chord-row { font-family: 'Consolas', monospace; color: var(--chord); font-weight: 700; font-size: calc(var(--lyric-size) * 0.8); line-height: 1.4; }
  .lyric-text { color: var(--text); font-size: var(--lyric-size); line-height: 1.5; }
  .lyric-line.has-chord::-webkit-scrollbar { height: 4px; }
  .lyric-line.has-chord::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .no-chords-msg { color: var(--text2); font-size: 13px; font-style: italic; margin-bottom: 16px; padding: 10px 14px; background: var(--surface2); border-radius: 8px; border-left: 3px solid var(--border); }

  /* Set list panel */
  #setlist-panel {
    position: absolute; top: 0; right: 0; bottom: 0; width: 320px; max-width: 88%;
    background: var(--surface); border-left: 1px solid var(--border);
    transform: translateX(100%); transition: transform 0.25s; z-index: 20;
    display: flex; flex-direction: column; box-shadow: -8px 0 24px rgba(0,0,0,0.3);
  }
  #setlist-panel.open { transform: translateX(0); }
  .setlist-head { padding: 14px 16px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
  .setlist-head h3 { font-size: 15px; }
  .setlist-body { flex: 1; overflow-y: auto; }
  .setlist-empty { padding: 24px 16px; color: var(--text2); font-size: 13px; text-align: center; }
  .sl-item { display: flex; align-items: center; gap: 6px; padding: 8px 12px; border-bottom: 1px solid var(--border); }
  .sl-item .sl-title { flex: 1; font-size: 13px; cursor: pointer; overflow: hidden; }
  .sl-item .sl-title .n { color: var(--text2); font-family: monospace; font-size: 11px; }
  .sl-item .mini { background: var(--surface2); border: 1px solid var(--border); color: var(--text); border-radius: 4px; width: 24px; height: 24px; cursor: pointer; font-size: 12px; line-height: 1; }
  .sl-item .mini:hover { background: var(--border); }

  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  .back-btn { display: none; align-items: center; gap: 6px; background: none; border: none; color: var(--accent); font-size: 14px; cursor: pointer; padding: 0; margin-bottom: 12px; font-family: inherit; }

  @media (max-width: 640px) {
    #song-list { width: 100%; display: none; }
    #song-list.show { display: block; }
    #song-detail { display: none; }
    #song-detail.show { display: block; }
    .back-btn { display: inline-flex !important; }
  }
</style>
</head>
<body>

<header>
  <img src="./logo.png" alt="JHGPH Prayer House Cheyyar" class="app-logo">
  <input id="searchbox" type="text" placeholder="பாடல் எண் அல்லது பெயர் தேடுங்கள்..." autocomplete="off">
  <label class="toggle" title="Show only songs that have chords">
    <input type="checkbox" id="chords-only-toggle">
    <span class="track"><span class="knob"></span></span>
    <span class="toggle-label">🎸</span>
  </label>
  <button id="fav-filter-btn" class="btn icon-btn" title="Show favourites only">★</button>
  <button id="setlist-btn" class="btn icon-btn" title="Set list">📋<span id="setlist-badge"></span></button>
  <button id="theme-btn" class="btn icon-btn" title="Light / dark theme">🌙</button>
  <button id="install-btn" class="btn" title="Install app">⬇ Install</button>
  <span id="song-count"></span>
</header>

<div class="main">
  <div id="song-list"></div>
  <div id="song-detail" class="empty"><span>ஒரு பாடலை தேர்ந்தெடுக்கவும்</span></div>

  <div id="setlist-panel">
    <div class="setlist-head">
      <h3>📋 Set List</h3>
      <div>
        <button class="btn" id="setlist-clear" style="font-size:11px">Clear</button>
        <button class="btn icon-btn" id="setlist-close">✕</button>
      </div>
    </div>
    <div class="setlist-body" id="setlist-body"></div>
  </div>
</div>

<script>
const CHROMATIC = ['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];
const ENHARMONIC = {'Db':'C#','Eb':'D#','Fb':'E','Gb':'F#','Ab':'G#','Bb':'A#','Cb':'B'};
function transposeChord(chord, steps) {
  if (!chord || steps === 0) return chord;
  return chord.replace(/[A-G][b#]?/g, (note) => {
    const clean = ENHARMONIC[note] || note;
    const idx = CHROMATIC.indexOf(clean);
    if (idx === -1) return note;
    return CHROMATIC[((idx + steps) % 12 + 12) % 12];
  });
}
function transposeLine(line, steps) {
  if (!line || steps === 0) return line;
  return line.replace(/[A-G][b#]?(?:m|maj|min|aug|dim|sus|add)?[0-9]?(?:\/[A-G][b#]?)?/g, (c) => transposeChord(c, steps));
}

let ALL_SONGS = [], activeSong = null, currentTranspose = 0;
let chordsOnly = false, favOnly = false;
let favs = new Set(JSON.parse(localStorage.getItem('njp-favs') || '[]'));
let setlist = JSON.parse(localStorage.getItem('njp-setlist') || '[]');
let fontSize = parseInt(localStorage.getItem('njp-fontsize') || '17', 10);

function saveFavs() { localStorage.setItem('njp-favs', JSON.stringify([...favs])); }
function saveSetlist() { localStorage.setItem('njp-setlist', JSON.stringify(setlist)); updateSetlistBadge(); }
function applyFontSize() { document.documentElement.style.setProperty('--lyric-size', fontSize + 'px'); }

fetch('./songs.json').then(r => r.json()).then(data => { ALL_SONGS = data; applyFilters(); });

// ── Filters ──
function applyFilters() {
  const q = document.getElementById('searchbox').value.trim().toLowerCase();
  let list = ALL_SONGS;
  if (chordsOnly) list = list.filter(s => s.chords);
  if (favOnly) list = list.filter(s => favs.has(s.id));
  if (q) list = list.filter(s => s.num === q || s.num.startsWith(q) || s.name.toLowerCase().includes(q) || s.title.includes(q));
  renderList(list);
  let label = '';
  if (chordsOnly) label += ' 🎸';
  if (favOnly) label += ' ★';
  document.getElementById('song-count').textContent = list.length + '/' + ALL_SONGS.length + label;
}
document.getElementById('searchbox').addEventListener('input', applyFilters);
document.getElementById('chords-only-toggle').addEventListener('change', function() {
  chordsOnly = this.checked; localStorage.setItem('njp-chords-only', chordsOnly ? '1' : '0'); applyFilters();
});
document.getElementById('fav-filter-btn').addEventListener('click', function() {
  favOnly = !favOnly; this.classList.toggle('active', favOnly); applyFilters();
});

// ── Theme ──
function applyTheme(t) {
  document.documentElement.setAttribute('data-theme', t);
  document.getElementById('theme-btn').textContent = t === 'light' ? '☀️' : '🌙';
  localStorage.setItem('njp-theme', t);
}
document.getElementById('theme-btn').addEventListener('click', function() {
  applyTheme((document.documentElement.getAttribute('data-theme') || 'dark') === 'dark' ? 'light' : 'dark');
});

(function restore() {
  applyTheme(localStorage.getItem('njp-theme') || 'dark');
  applyFontSize();
  if (localStorage.getItem('njp-chords-only') === '1') { chordsOnly = true; document.getElementById('chords-only-toggle').checked = true; }
  updateSetlistBadge();
})();

// ── List ──
function renderList(songs) {
  document.getElementById('song-list').innerHTML = songs.map(s => `
    <div class="song-item" data-id="${s.id}" onclick="openSong(${s.id})">
      <div class="num">${s.num || '—'}${s.chords ? '<span class="badge-chord"></span>' : ''}${favs.has(s.id) ? '<span class="badge-fav">★</span>' : ''}</div>
      <div class="tamil">${s.title || s.name}</div>
      <div class="eng">${s.name}</div>
    </div>`).join('');
}

function openSong(id) {
  const song = ALL_SONGS.find(s => s.id === id);
  if (!song) return;
  activeSong = song; currentTranspose = 0;
  document.querySelectorAll('.song-item').forEach(el => el.classList.remove('active'));
  const item = document.querySelector(`.song-item[data-id="${id}"]`);
  if (item) { item.classList.add('active'); item.scrollIntoView({block:'nearest'}); }
  renderDetail(song);
  document.getElementById('song-list').classList.remove('show');
  document.getElementById('song-detail').classList.add('show');
}

function parseNotes(notes) {
  if (!notes) return {};
  const p = notes.split('/');
  return { key: p[0] || '', style: p[1] || '', tempo: (p.find(x => x.startsWith('T-')) || '').replace('T-','') };
}

function buildSlides(lyricsStr, chordsStr, steps) {
  if (!lyricsStr) return [];
  const L = lyricsStr.split('<slide>'), C = chordsStr ? chordsStr.split('<slide>') : [];
  return L.map((blk, si) => {
    const lines = blk.split('<BR>').filter(l => l.trim());
    const cl = (C[si] || '').split(/<br>/i);
    return lines.map((lyric, li) => {
      let chord = (cl[li] || '').trimEnd();
      if (chord && steps !== 0) chord = transposeLine(chord, steps);
      return { lyric, chord };
    });
  });
}

function renderDetail(song) {
  const detail = document.getElementById('song-detail');
  detail.classList.remove('empty');
  const info = parseNotes(song.notes);
  const key = song.key || info.key || '', style = info.style || '', tempo = info.tempo || '';
  const hasChords = !!(song.chords && song.chord_lyrics);
  const isFav = favs.has(song.id);
  const inSet = setlist.includes(song.id);

  let chips = '';
  if (key) chips += `<span class="info-chip key">🎵 ${key}</span>`;
  if (tempo) chips += `<span class="info-chip">♩ ${tempo} BPM</span>`;
  if (style) chips += `<span class="info-chip">🎼 ${style}</span>`;
  if (hasChords) chips += `<span class="info-chip" style="color:#ff4444;border-color:#ff4444">🎸 Chords</span>`;

  const transposeGroup = hasChords ? `
    <div class="group"><span>Key</span>
      <button class="tbtn" onclick="changeTranspose(-1)">−</button>
      <div id="transpose-value">0</div>
      <button class="tbtn" onclick="changeTranspose(+1)">+</button>
      <button class="tbtn" onclick="changeTranspose(0,'reset')" style="font-size:11px">↺</button>
    </div>` : '';

  // prev/next within set list
  let navRow = '';
  const idx = setlist.indexOf(song.id);
  if (idx !== -1 && setlist.length > 1) {
    navRow = `<div class="nav-row">
      <button class="btn" onclick="setlistNav(-1)" ${idx===0?'disabled':''}>‹ Prev</button>
      <button class="btn" onclick="setlistNav(1)" ${idx===setlist.length-1?'disabled':''}>Next ›</button>
    </div>`;
  }

  detail.innerHTML = `
    <button class="back-btn" onclick="showList()">← Back</button>
    <div class="song-header">
      <div class="number">பாடல் — ${song.num || '?'}</div>
      <div class="tamil-title">${song.title || song.name}</div>
      <div class="eng-title">${song.name}</div>
      ${chips ? `<div class="music-info">${chips}</div>` : ''}
    </div>
    <div class="toolbar">
      <button class="tbtn ${isFav?'on':''}" id="fav-btn" onclick="toggleFav(${song.id})">${isFav?'★ Favourite':'☆ Favourite'}</button>
      <button class="tbtn ${inSet?'set-on':''}" id="set-btn" onclick="toggleSetlist(${song.id})">${inSet?'✓ In set list':'＋ Set list'}</button>
      <div class="group"><span>A</span>
        <button class="tbtn" onclick="changeFont(-1)">A−</button>
        <button class="tbtn" onclick="changeFont(1)">A+</button>
      </div>
      ${transposeGroup}
    </div>
    ${navRow}
    ${!hasChords ? '<div class="no-chords-msg">இந்த பாடலுக்கு chords இல்லை — lyrics மட்டுமே</div>' : ''}
    <div class="lyrics-section" id="lyrics-body"></div>`;
  renderLyrics();
}

function renderLyrics() {
  if (!activeSong) return;
  const body = document.getElementById('lyrics-body');
  if (!body) return;
  const hasChords = !!(activeSong.chords && activeSong.chord_lyrics);
  const slides = buildSlides(hasChords ? activeSong.chord_lyrics : activeSong.lyrics, hasChords ? activeSong.chords : '', currentTranspose);
  body.innerHTML = slides.map(lines => `
    <div class="slide">
      ${lines.map(({lyric, chord}) => `
        <div class="lyric-line ${chord ? 'has-chord' : 'no-chord'}">
          ${chord ? `<div class="chord-row">${escHtml(chord)}</div>` : ''}
          <div class="lyric-text">${escHtml(lyric)}</div>
        </div>`).join('')}
    </div>`).join('');
  const tv = document.getElementById('transpose-value');
  if (tv) tv.textContent = currentTranspose >= 0 ? '+' + currentTranspose : '' + currentTranspose;
}

function changeTranspose(delta, mode) { if (mode === 'reset') currentTranspose = 0; else currentTranspose += delta; renderLyrics(); }
function changeFont(delta) { fontSize = Math.max(13, Math.min(30, fontSize + delta)); localStorage.setItem('njp-fontsize', fontSize); applyFontSize(); }

// ── Favourites ──
function toggleFav(id) {
  if (favs.has(id)) favs.delete(id); else favs.add(id);
  saveFavs();
  const b = document.getElementById('fav-btn');
  const on = favs.has(id);
  if (b) { b.classList.toggle('on', on); b.textContent = on ? '★ Favourite' : '☆ Favourite'; }
  applyFilters();
}

// ── Set list ──
function toggleSetlist(id) {
  const i = setlist.indexOf(id);
  if (i === -1) setlist.push(id); else setlist.splice(i, 1);
  saveSetlist();
  if (activeSong && activeSong.id === id) renderDetail(activeSong);
  renderSetlist();
}
function updateSetlistBadge() {
  const b = document.getElementById('setlist-badge');
  if (b) b.textContent = setlist.length ? ' ' + setlist.length : '';
}
function renderSetlist() {
  const body = document.getElementById('setlist-body');
  if (!setlist.length) { body.innerHTML = '<div class="setlist-empty">Set list is empty.<br>Open a song and tap "＋ Set list".</div>'; return; }
  body.innerHTML = setlist.map((id, i) => {
    const s = ALL_SONGS.find(x => x.id === id); if (!s) return '';
    return `<div class="sl-item">
      <div class="sl-title" onclick="openSong(${id})"><span class="n">${s.num || '—'}</span> ${s.title || s.name}</div>
      <button class="mini" onclick="moveSet(${i},-1)" ${i===0?'disabled':''}>▲</button>
      <button class="mini" onclick="moveSet(${i},1)" ${i===setlist.length-1?'disabled':''}>▼</button>
      <button class="mini" onclick="removeSet(${id})">✕</button>
    </div>`;
  }).join('');
}
function moveSet(i, dir) {
  const j = i + dir; if (j < 0 || j >= setlist.length) return;
  [setlist[i], setlist[j]] = [setlist[j], setlist[i]];
  saveSetlist(); renderSetlist();
}
function removeSet(id) {
  setlist = setlist.filter(x => x !== id); saveSetlist(); renderSetlist();
  if (activeSong && activeSong.id === id) renderDetail(activeSong);
}
function setlistNav(dir) {
  if (!activeSong) return;
  const i = setlist.indexOf(activeSong.id); if (i === -1) return;
  const j = i + dir; if (j < 0 || j >= setlist.length) return;
  openSong(setlist[j]);
}
document.getElementById('setlist-btn').addEventListener('click', () => {
  document.getElementById('setlist-panel').classList.toggle('open'); renderSetlist();
});
document.getElementById('setlist-close').addEventListener('click', () => document.getElementById('setlist-panel').classList.remove('open'));
document.getElementById('setlist-clear').addEventListener('click', () => {
  if (confirm('Clear the whole set list?')) { setlist = []; saveSetlist(); renderSetlist(); if (activeSong) renderDetail(activeSong); }
});

function escHtml(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function showList() { document.getElementById('song-list').classList.add('show'); document.getElementById('song-detail').classList.remove('show'); }

// ── Install prompt ──
let deferredPrompt = null;
window.addEventListener('beforeinstallprompt', (e) => {
  e.preventDefault(); deferredPrompt = e;
  document.getElementById('install-btn').style.display = 'inline-block';
});
document.getElementById('install-btn').addEventListener('click', async () => {
  if (!deferredPrompt) return;
  deferredPrompt.prompt();
  await deferredPrompt.userChoice;
  deferredPrompt = null;
  document.getElementById('install-btn').style.display = 'none';
});
window.addEventListener('appinstalled', () => { document.getElementById('install-btn').style.display = 'none'; });

// ── Service worker ──
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => navigator.serviceWorker.register('./sw.js').catch(e => console.warn('SW:', e)));
}
</script>
</body>
</html>
